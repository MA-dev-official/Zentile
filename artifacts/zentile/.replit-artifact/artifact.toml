kind = "web"
previewPath = "/"
title = "Zentile"
version = "1.0.0"
id = "artifacts/zentile"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25952

[services.development]
run = "pnpm --filter @workspace/zentile run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/zentile", "run", "build" ]
publicDir = "artifacts/zentile/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25952"
BASE_PATH = "/"
